<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CinemaReserve</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
	rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">
</head>

<body>

	<!-- NAVBAR -->
	<nav class="navbar navbar-expand-lg">
		<div class="container-fluid">
			<a class="navbar-brand" href="/">🎬 <span>CinemaReserve</span></a>

		<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
			data-bs-target="#navMenu">
			<span class="navbar-toggler-icon"></span>
		</button>

		<div id="navMenu" class="collapse navbar-collapse justify-content-end">

			<div th:if="${session.user == null}">
				<a href="/login" class="btn btn-outline-light me-2">Login</a> <a
					href="/register" class="btn btn-primary">Register</a>
			</div>

			<div th:if="${session.user != null}"
				class="d-flex align-items-center">
				<span class="me-3 fw-semibold"
					th:text="'Hello, ' + ${session.user.name}"></span> <a
					th:if="${session.user.role=='USER'}" href="/bookings"
					class="btn btn-outline-light me-2">My Bookings</a> <a
					th:if="${session.user.role=='ADMIN'}" href="/manage-movies"
					class="btn btn-danger me-2">Manage Movies</a> <a
					th:if="${session.user.role=='ADMIN'}" href="/manage-theaters"
					class="btn btn-danger me-2">Manage Theaters</a> <a
					th:if="${session.user.role=='ADMIN'}" href="/manage-users"
					class="btn btn-danger me-2">Manage Users</a> <a href="/logout"
					class="btn btn-primary">Logout</a>
			</div>

			</div>
		</div>
	</nav>

	<!-- TOASTS -->
	<div class="toastify-container">
		<div th:if="${pass}" class="custom-toast success">
			<span th:text="${pass}"></span>
			<button class="custom-toast-close" onclick="this.parentElement.remove()">×</button>
		</div>
		<div th:if="${fail}" class="custom-toast error">
			<span th:text="${fail}"></span>
			<button class="custom-toast-close" onclick="this.parentElement.remove()">×</button>
		</div>
	</div>

	<!-- HERO -->
	<section class="hero-section">
		<h1 class="hero-title text-gradient">Book Your Favorite Movies</h1>
		<p class="hero-subtitle">Fast • Secure • Premium Experience</p>
		<a href="#movies" class="btn btn-primary btn-lg mt-3">Browse Movies</a>
	</section>

	<!-- MOVIES -->
	<section class="container mb-5" id="movies">
		<h2 class="text-center mb-5" th:text="${movies.isEmpty() ? 'No Movies Available' : 'Now Showing'}">Now Showing</h2>

		<div th:if="${movies.isEmpty()}" class="text-center py-5 glass-card">
			<p class="text-secondary fs-4 m-0">Check back later for new releases!</p>
		</div>

		<div th:if="${!movies.isEmpty()}" class="row g-4">
			<div class="col-lg-3 col-md-4 col-sm-6" th:each="movie:${movies}">
				<div class="movie-card">
					<div class="movie-image-container">
						<img th:src="${movie.imageLink}">
						<button th:if="${movie.trailerLink != null}" 
								class="btn btn-trailer position-absolute top-0 end-0 m-3"
								th:attr="data-trailer=${movie.trailerLink}, data-name=${movie.name}"
								onclick="openTrailer(this)">
							▶ Trailer
						</button>
					</div>
					<div class="card-body">
						<h5 th:text="${movie.name}"></h5>
						<div class="d-flex justify-content-between align-items-center mb-4 mt-2">
							<span class="movie-badge" th:text="${movie.genre}"></span>
							<span class="text-secondary small fw-medium"><span th:text="${movie.duration}"></span> hrs</span>
						</div>
						<a th:href="'/book/movie/'+${movie.id}"
							class="btn btn-primary w-100">Book Now</a>
					</div>
				</div>
			</div>
		</div>
	</section>

	<!-- TRAILER MODAL -->
	<div class="modal fade" id="trailerModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-centered">
			<div class="modal-content bg-dark border-secondary">
				<div class="modal-header border-0">
					<h5 class="modal-title text-white" id="modalMovieName">Trailer</h5>
					<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body p-0">
					<div class="ratio ratio-16x9">
						<iframe id="trailerFrame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		function openTrailer(btn) {
			let link = btn.getAttribute('data-trailer');
			let name = btn.getAttribute('data-name');
			
			if (!link || link === 'null') {
				alert('Trailer not available for this movie.');
				return;
			}
			
			// Convert YouTube watch link to embed link
			if (link.includes('youtube.com/watch?v=')) {
				link = link.replace('watch?v=', 'embed/');
			} else if (link.includes('youtu.be/')) {
				link = 'https://www.youtube.com/embed/' + link.split('/').pop();
			} else if (!link.includes('embed') && link.length < 20) {
				// Assume it's just an ID
				link = 'https://www.youtube.com/embed/' + link;
			}
			
			// Ensure protocol
			if (!link.startsWith('http')) {
				link = 'https://' + link;
			}
			
			const frame = document.getElementById('trailerFrame');
			frame.src = link;
			document.getElementById('modalMovieName').innerText = name + " - Trailer";
			
			let modal = new bootstrap.Modal(document.getElementById('trailerModal'));
			modal.show();
			
			// Stop video when modal closed
			document.getElementById('trailerModal').addEventListener('hidden.bs.modal', function () {
				frame.src = "";
			});
		}
	</script>

	<footer class="py-4 text-center text-secondary border-top border-secondary mt-5" style="border-color: rgba(255,255,255,0.1) !important;">
		<p class="mb-0">© 2025 CinemaReserve — All Rights Reserved</p>
	</footer>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
