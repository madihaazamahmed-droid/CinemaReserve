<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CinemaReserve</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
	rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">
</head>

<body>

	<!-- TOASTS -->
	<div class="toastify-container">
		<div th:if="${pass}" class="custom-toast success">
			<span th:text="${pass}"></span>
			<button class="custom-toast-close" onclick="this.parentElement.remove()">×</button>
		</div>
		<div th:if="${fail}" class="custom-toast error">
			<span th:text="${fail}"></span>
			<button class="custom-toast-close" onclick="this.parentElement.remove()">×</button>
		</div>
	</div>

	<!-- LOGIN CARD -->
	<div class="login-box glass-card mx-auto text-center" style="max-width: 420px; width: 100%; margin-top: 5rem;">
		<h3 class="text-gradient mb-2" style="font-size: 2rem;">Welcome Back</h3>
		<p class="text-secondary mb-4">Sign in to continue booking</p>

		<form action="/login" method="post" class="text-start">
			<div class="mb-4">
				<label class="form-label">Email address</label>
				<input type="email" name="email" class="form-control"
					placeholder="Enter your email" required>
			</div>

			<div class="mb-4">
				<label class="form-label">Password</label>
				<input type="password" name="password" class="form-control"
					placeholder="Enter your password" required>
			</div>

			<div class="mb-4 form-check text-start">
				<input type="checkbox" class="form-check-input" id="remember">
				<label class="form-check-label text-secondary" for="remember">Remember me</label>
			</div>

			<button class="btn btn-primary w-100 py-3 mt-2">Sign In</button>
		</form>

		<div class="mt-4">
			<a href="/forgot-password" style="color: var(--accent-1); text-decoration: none;">Forgot Password?</a><br> 
			<span class="text-secondary mt-2 d-inline-block">New here?</span> 
			<a href="/register" style="color: var(--accent-1); text-decoration: none; font-weight: 700;">Create account</a>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

	<script>
		// Toasts are handled by simple inline onclick removal for the new UI
	</script>

</body>
</html>
