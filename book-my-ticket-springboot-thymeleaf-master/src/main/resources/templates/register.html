<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | CinemaReserve</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap"
	rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">
</head>

<body>

	<!-- TOASTS -->
	<div class="toastify-container">
		<div th:if="${pass}" class="custom-toast success">
			<span th:text="${pass}"></span>
			<button class="custom-toast-close" onclick="this.parentElement.remove()">×</button>
		</div>
		<div th:if="${fail}" class="custom-toast error">
			<span th:text="${fail}"></span>
			<button class="custom-toast-close" onclick="this.parentElement.remove()">×</button>
		</div>
	</div>

	<!-- REGISTER -->
	<div class="register-box glass-card mx-auto my-5" style="max-width: 480px; width: 100%;">
		<h3 class="text-gradient text-center mb-4" style="font-size: 2rem;">Create Account</h3>

		<form action="/register" method="post" th:object="${userDto}">

			<div class="mb-4">
				<label class="form-label">Full Name</label> 
				<input type="text" class="form-control" th:field="*{name}" placeholder="Enter your name"> 
				<span class="text-danger small mt-1" th:errors="*{name}"></span>
			</div>

			<div class="mb-4">
				<label class="form-label">Email Address</label> 
				<input type="email" class="form-control" th:field="*{email}" placeholder="Enter your email"> 
				<span class="text-danger small mt-1" th:errors="*{email}"></span>
			</div>

			<div class="mb-4">
				<label class="form-label">Mobile Number</label> 
				<input type="number" class="form-control" th:field="*{mobile}" placeholder="Enter mobile number"> 
				<span class="text-danger small mt-1" th:errors="*{mobile}"></span>
			</div>

			<div class="mb-4">
				<label class="form-label">Password</label> 
				<input type="password" class="form-control" th:field="*{password}" placeholder="Create a password"> 
				<span class="text-danger small mt-1" th:errors="*{password}"></span>
			</div>

			<div class="mb-4">
				<label class="form-label">Confirm Password</label> 
				<input type="password" class="form-control" th:field="*{confirmPassword}" placeholder="Repeat password">
				<span class="text-danger small mt-1" th:errors="*{confirmPassword}"></span>
			</div>

			<div class="form-check mb-4">
				<input class="form-check-input" type="checkbox" th:field="*{terms}">
				<label class="form-check-label text-secondary">I accept the terms & conditions</label> 
				<span class="text-danger small mt-1 d-block" th:errors="*{terms}"></span>
			</div>

			<button class="btn btn-primary w-100 py-3 mt-2">Register Now</button>

			<div class="text-center mt-4">
				<span class="text-secondary">Already have an account?</span> 
				<a href="/login" style="color: var(--accent-1); font-weight: 700; text-decoration: none;">Login</a>
			</div>

		</form>
	</div>

	<script>
		// Toasts are handled by simple inline onclick removal for the new UI
	</script>

</body>
</html>
